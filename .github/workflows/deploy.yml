name: Deploy Backend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript project
        run: npm run build

      - name: Sync artifacts to server (rsync, root sync with excludes)
        uses: burnett01/rsync-deployments@7.0.2
        with:
          switches: -avzr --delete --exclude '.git/' --exclude 'node_modules/' --exclude '.env' --exclude 'data/' --exclude 'data/*.db*' --exclude 'data/*.db-shm' --exclude 'data/*.db-wal'
          path: ./
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}
          remote_path: ${{ secrets.SERVER_TARGET_DIR }}

      - name: Safe DB schema sync and Start App
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.SERVER_TARGET_DIR }}"
            
            # 1. Install dependencies natively on ARM64 server
            npm install
            
            # 2. Database schema (drizzle-kit push; avoids conflict when tables already exist vs migrate)
            mkdir -p data
            npm run db:push:auth && npm run db:push:articles
            
            # 3. Restart the application 
            pm2 restart backend-api || pm2 start dist/server.js --name backend-api