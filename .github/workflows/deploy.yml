name: Deploy Backend

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript project
        run: npm run build

      # Note: You currently have both SCP and rsync actions defined. 
      # Usually, just the rsync step is enough since it handles delta transfers and exclusions cleanly. 
      # I've left both in case you have a specific need, but you can safely remove the SCP block if rsync does the job.
      - name: Copy project to server (SCP, no SQLite data)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "dist,package.json,package-lock.json"
          target: ${{ secrets.SERVER_TARGET_DIR }}

      - name: Sync artifacts to server (rsync, exclude SQLite files)
        uses: burnett01/rsync-deployments@7.0.2 
        with:
          switches: -avzr --delete --exclude 'data/*.db*' --exclude 'data/*.db-shm' --exclude 'data/*.db-wal'
          path: dist/ package.json package-lock.json
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SERVER_SSH_KEY }}
          remote_path: ${{ secrets.SERVER_TARGET_DIR }}

      - name: Safe DB bootstrap/migration and Start App
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.SERVER_TARGET_DIR }}"
            
            # 1. Install ALL dependencies so tsx and drizzle-kit are available
            npm install
            
            # 2. Database Migrations
            mkdir -p data
            if [ ! -f data/auth.db ] || [ ! -f data/articles.db ]; then
              npm run db:init
            fi
            
            # Added -y to automatically accept any npx installation prompts
            npx -y drizzle-kit migrate
            
            # 3. Restart the application 
            pm2 restart backend-api || pm2 start dist/index.js --name backend-api